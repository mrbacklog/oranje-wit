name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: "Skip E2E tests"
        type: boolean
        default: false

jobs:
  # ── Job 1: Quality checks ──────────────────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm --filter @oranje-wit/web exec tsc --noEmit

      - name: Lint
        run: pnpm --filter @oranje-wit/web lint

      - name: Format check
        run: pnpm format:check

      - name: Tests
        run: pnpm test

  # ── Job 2: Build (parallel aan quality) ────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      NEXTAUTH_SECRET: ci-build-secret
      NEXTAUTH_URL: http://localhost:3000
      ANTHROPIC_API_KEY: sk-dummy-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**', 'packages/*/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build

  # ── Job 3: E2E Tests (na build, met PostgreSQL service container) ──────────
  e2e:
    needs: [build]
    if: github.event_name != 'workflow_dispatch' || inputs.skip_e2e != true
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oranjewit_test
      NEXTAUTH_SECRET: e2e-test-secret
      NEXTAUTH_URL: http://localhost:3000
      E2E_TEST: "true"
      AUTH_GOOGLE_ID: dummy
      AUTH_GOOGLE_SECRET: dummy
      ANTHROPIC_API_KEY: sk-dummy-key
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oranjewit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push schema naar test database
        run: npx prisma db push
        working-directory: packages/database

      - name: Seed test database
        run: pnpm dlx tsx e2e/fixtures/seed.ts

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Build for E2E
        run: pnpm build

      - name: E2E tests
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Job 4: Deploy (na groen CI, op main push OF workflow_dispatch) ─────────
  deploy:
    needs: [quality, build, e2e]
    if: |
      always() &&
      needs.quality.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.e2e.result == 'success' || needs.e2e.result == 'skipped') &&
      (github.ref == 'refs/heads/main') &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          ENV_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          SVC_ID: ${{ secrets.RAILWAY_SERVICE_WEB }}
        run: |
          curl -sf -X POST https://backboard.railway.com/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeploy(environmentId: \\\"$ENV_ID\\\", serviceId: \\\"$SVC_ID\\\", latestCommit: true) }\"}"

      - name: Verify deployment health
        run: |
          echo "Wacht 30s op Railway build..."
          sleep 30

          HEALTH_URL="https://www.ckvoranjewit.app/api/health"
          MAX_ATTEMPTS=20
          INTERVAL=15

          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Health check poging $i/$MAX_ATTEMPTS..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$HEALTH_URL" 2>/dev/null || echo "000")

            if [ "$RESPONSE" = "200" ]; then
              echo "Deployment gezond! HTTP $RESPONSE"
              BODY=$(curl -s "$HEALTH_URL")
              echo "$BODY"
              exit 0
            fi

            echo "HTTP $RESPONSE — wacht ${INTERVAL}s..."
            sleep $INTERVAL
          done

          echo "FOUT: Deployment niet gezond na $((MAX_ATTEMPTS * INTERVAL + 30))s"
          echo "Laatste response: HTTP $RESPONSE"
          curl -s "$HEALTH_URL" || true
          exit 1

      - name: Deploy Cloudflare Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN niet geconfigureerd, skip Worker deploy"
            exit 0
          fi
          npx wrangler deploy
        working-directory: cloudflare/railway-proxy
