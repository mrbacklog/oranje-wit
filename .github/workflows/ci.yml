name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: "Skip E2E tests"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: Fast gate (quality checks) ───────────────────────────────────────
  fast-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Typecheck
        run: pnpm --filter @oranje-wit/web exec tsc --noEmit

      - name: Lint
        run: pnpm --filter @oranje-wit/web lint

      - name: Typecheck (ti-studio)
        run: pnpm --filter @oranje-wit/ti-studio exec tsc --noEmit

      - name: Lint (ti-studio)
        run: pnpm --filter @oranje-wit/ti-studio lint

      - name: Format check
        run: pnpm format:check

      - name: Tests
        run: pnpm test

  # ── Job 2: Build (parallel aan fast-gate) ─────────────────────────────────
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy
      NEXTAUTH_SECRET: ci-build-secret
      NEXTAUTH_URL: http://localhost:3000
      ANTHROPIC_API_KEY: sk-dummy-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - uses: actions/cache@v4
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**', 'packages/*/src/**') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
            nextjs-${{ runner.os }}-

      - name: Build
        run: pnpm build

      - name: Build (ti-studio)
        run: pnpm --filter @oranje-wit/ti-studio build

  # ── Job 3: E2E Tests (na build + fast-gate, met PostgreSQL service container) ──────────
  e2e:
    needs: [build, fast-gate]
    timeout-minutes: 30
    if: |
      (github.event_name != 'workflow_dispatch' || inputs.skip_e2e != true) &&
      !startsWith(github.event.head_commit.message, 'patch:') &&
      !startsWith(github.event.head_commit.message, 'patch(') &&
      !startsWith(github.event.head_commit.message, 'fix:') &&
      !startsWith(github.event.head_commit.message, 'fix(')
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/oranjewit_test
      NEXTAUTH_SECRET: e2e-test-secret
      NEXTAUTH_URL: http://localhost:3000
      E2E_TEST: "true"
      AUTH_GOOGLE_ID: dummy
      AUTH_GOOGLE_SECRET: dummy
      ANTHROPIC_API_KEY: sk-dummy-key
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: oranjewit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Push schema naar test database
        run: npx prisma db push
        working-directory: packages/database

      - name: Seed test database
        run: pnpm dlx tsx e2e/fixtures/seed.ts

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: E2E tests
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Job 4: Deploy naar Railway ──────────────────────────────────────────────
  deploy:
    needs: [fast-gate, build]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Trigger Railway deploy (web)
        run: |
          deploy_with_retry() {
            local SERVICE_ID="$1"
            local LABEL="$2"
            local ATTEMPT=1
            local MAX_ATTEMPTS=4
            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              RESULT=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
                -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"query\":\"mutation { serviceInstanceDeploy(environmentId: \\\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\\\", serviceId: \\\"$SERVICE_ID\\\", commitSha: \\\"${{ github.sha }}\\\") }\"}")
              echo "Railway $LABEL response (poging $ATTEMPT): $RESULT"
              if echo "$RESULT" | grep -q '"serviceInstanceDeploy":true'; then
                echo "$LABEL deploy getriggerd (${{ github.sha }})"
                return 0
              fi
              # Rate limit? Parse het aantal seconden en wacht.
              WAIT=$(echo "$RESULT" | grep -oE 'try again in [0-9]+' | grep -oE '[0-9]+' | head -1)
              if [ -n "$WAIT" ]; then
                WAIT=$((WAIT + 5))
                echo "Rate limit — wacht ${WAIT}s voordat we opnieuw proberen"
                sleep "$WAIT"
              else
                echo "Onbekende fout — wacht 30s"
                sleep 30
              fi
              ATTEMPT=$((ATTEMPT + 1))
            done
            echo "$LABEL deploy mislukt na $MAX_ATTEMPTS pogingen"
            return 1
          }
          deploy_with_retry "${{ secrets.RAILWAY_SERVICE_WEB }}" "web"

      - name: Trigger Railway deploy (ti-studio)
        env:
          RAILWAY_SERVICE_TI_STUDIO: ${{ secrets.RAILWAY_SERVICE_TI_STUDIO }}
        run: |
          if [ -z "$RAILWAY_SERVICE_TI_STUDIO" ]; then
            echo "RAILWAY_SERVICE_TI_STUDIO niet ingesteld — ti-studio deploy overgeslagen"
            exit 0
          fi
          deploy_with_retry() {
            local SERVICE_ID="$1"
            local LABEL="$2"
            local ATTEMPT=1
            local MAX_ATTEMPTS=4
            while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
              RESULT=$(curl -s -X POST "https://backboard.railway.com/graphql/v2" \
                -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
                -H "Content-Type: application/json" \
                -d "{\"query\":\"mutation { serviceInstanceDeploy(environmentId: \\\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\\\", serviceId: \\\"$SERVICE_ID\\\", commitSha: \\\"${{ github.sha }}\\\") }\"}")
              echo "Railway $LABEL response (poging $ATTEMPT): $RESULT"
              if echo "$RESULT" | grep -q '"serviceInstanceDeploy":true'; then
                echo "$LABEL deploy getriggerd (${{ github.sha }})"
                return 0
              fi
              WAIT=$(echo "$RESULT" | grep -oE 'try again in [0-9]+' | grep -oE '[0-9]+' | head -1)
              if [ -n "$WAIT" ]; then
                WAIT=$((WAIT + 5))
                echo "Rate limit — wacht ${WAIT}s voordat we opnieuw proberen"
                sleep "$WAIT"
              else
                echo "Onbekende fout — wacht 30s"
                sleep 30
              fi
              ATTEMPT=$((ATTEMPT + 1))
            done
            echo "$LABEL deploy mislukt na $MAX_ATTEMPTS pogingen"
            return 1
          }
          deploy_with_retry "$RAILWAY_SERVICE_TI_STUDIO" "ti-studio"

      - name: Wacht op Railway deployment (90s)
        run: sleep 90

      - name: Post-deploy health check
        run: |
          FAIL=0
          for URL in "https://www.ckvoranjewit.app/api/health" "https://teamindeling.ckvoranjewit.app/api/health"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
            if [ "$STATUS" != "200" ]; then
              echo "::warning::$URL returned HTTP $STATUS"
              FAIL=1
            else
              echo "OK: $URL (HTTP $STATUS)"
            fi
          done
          if [ "$FAIL" = "1" ]; then
            echo "::warning::Een of meer health checks gefaald — controleer Railway dashboard"
          fi
