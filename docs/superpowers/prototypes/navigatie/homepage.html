<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage — TI Studio</title>
  <link rel="stylesheet" href="tokens.css">
  <style>
    :root {
      --accent-h: #ff8533;
      --accent-glow: 0 0 0 1px rgba(255,107,0,.4), 0 0 16px rgba(255,107,0,.2);
      --card-radius: 14px;
      --info: #3b82f6;
      --ok: #22c55e;
      --warn: #eab308;
      --err: #ef4444;
    }

    .page { display: grid; grid-template-columns: var(--ribbon) 1fr; height: 100vh; overflow: hidden; }

    /* ─── Ribbon ─────────────────────────────────────────────────── */
    .ribbon {
      background: var(--surface-page);
      border-right: 1px solid var(--border-light);
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 0 8px; gap: 2px;
    }
    .ribbon-logo {
      width: 30px; height: 30px; margin-bottom: 12px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; border-radius: 9px;
      background: rgba(59,130,246,.1);
    }
    .ribbon-logo svg { width: 24px; height: 24px; }
    .ribbon-btn {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: none; border: none;
      color: var(--text-tertiary); position: relative; flex-shrink: 0;
      transition: background 120ms, color 120ms;
    }
    .ribbon-btn:hover { color: var(--text-secondary); background: rgba(255,255,255,.04); }
    .ribbon-sep { width: 22px; height: 1px; background: var(--border-light); margin: 4px 0; }
    .ribbon-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .ribbon-footer { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 6; }
    .ribbon-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: #2a1a0a; border: 2px solid rgba(255,107,0,.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700; color: var(--ow-accent); cursor: pointer;
      transition: border-color 120ms;
    }
    .ribbon-avatar:hover { border-color: rgba(255,107,0,.6); }
    .ribbon-memo-wrap { position: relative; }
    .ribbon-badge {
      position: absolute; top: 3px; right: 3px;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--ow-accent); color: #fff;
      font-size: 8px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      line-height: 1; pointer-events: none;
    }

    /* ─── Content ────────────────────────────────────────────────── */
    .content {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; overflow-y: auto; padding: 0 24px;
      min-height: 0;
    }
    .home { width: 100%; max-width: 640px; }

    /* ─── Header ─────────────────────────────────────────────────── */
    .home-header { margin-bottom: 32px; }
    .home-groet {
      font-size: 24px; font-weight: 800; color: var(--text-primary);
      letter-spacing: -0.03em; margin: 0 0 4px; line-height: 1.2;
    }
    .home-sub {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text-tertiary); margin: 0;
    }
    .seizoen-badge {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 3px 10px; background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08); border-radius: 6px;
      font-size: 11px; font-weight: 600; color: var(--text-secondary);
    }
    .seizoen-badge .dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--color-success-500); flex-shrink: 0;
    }

    /* ─── Tiles ──────────────────────────────────────────────────── */
    .tiles { display: flex; flex-direction: column; gap: 10px; }

    /* Primaire tile: Werkbord */
    .tile-primary {
      display: flex; align-items: center; gap: 18px;
      padding: 20px 24px;
      background: linear-gradient(135deg, rgba(59,130,246,.06) 0%, rgba(59,130,246,.02) 100%);
      border: 1px solid rgba(59,130,246,.2);
      border-radius: var(--card-radius);
      text-decoration: none; color: inherit;
      transition: border-color 180ms, background 180ms;
      cursor: pointer;
    }
    .tile-primary:hover {
      border-color: rgba(59,130,246,.4);
      background: linear-gradient(135deg, rgba(59,130,246,.1) 0%, rgba(59,130,246,.04) 100%);
    }

    /* Volledigheidsring */
    .ring-wrap {
      position: relative; width: 52px; height: 52px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ring-wrap svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
    .ring-pct {
      font-size: 12px; font-weight: 800; color: var(--info);
      z-index: 1; letter-spacing: -0.03em;
    }

    .tile-primary-text { flex: 1; min-width: 0; }
    .tile-primary-title {
      font-size: 17px; font-weight: 700; color: var(--text-primary);
      letter-spacing: -0.01em; margin-bottom: 2px;
    }
    .tile-primary-desc { font-size: 12px; color: var(--text-secondary); }
    .tile-primary-stats { text-align: right; flex-shrink: 0; }
    .tile-primary-num { font-size: 22px; font-weight: 800; color: var(--info); line-height: 1; }
    .tile-primary-label { font-size: 10px; color: var(--text-tertiary); margin-top: 2px; }
    .tile-arrow {
      width: 28px; height: 28px; border-radius: 8px;
      background: rgba(59,130,246,.08);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--info);
    }

    /* Secundaire tiles (2-kolom grid) */
    .tiles-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .tile-sec {
      display: flex; flex-direction: column; justify-content: space-between;
      gap: 14px; padding: 18px 20px;
      background: var(--surface-card); border: 1px solid var(--border-light);
      border-radius: var(--card-radius);
      text-decoration: none; color: inherit;
      transition: border-color 180ms, background 180ms;
      cursor: pointer;
    }
    .tile-sec:hover { border-color: var(--border-default); background: #1f1f23; }

    .tile-sec-icon {
      width: 38px; height: 38px; border-radius: 10px;
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.06);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .tile-sec-title {
      font-size: 14px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px;
    }
    .tile-sec-desc { font-size: 11px; color: var(--text-tertiary); line-height: 1.4; }

    /* Memo tile met status badges */
    .tile-memo { grid-column: 1 / -1; flex-direction: row; align-items: center; gap: 16px; }
    .tile-memo .tile-sec-icon {
      background: rgba(234,179,8,.06); border-color: rgba(234,179,8,.15);
    }
    .tile-memo-content { flex: 1; min-width: 0; }
    .memo-badges { display: flex; align-items: center; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
    .memo-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 5px;
      font-size: 10px; font-weight: 600;
    }
    .memo-badge.open { background: rgba(251,191,36,.08); color: #fbbf24; border: 1px solid rgba(251,191,36,.18); }
    .memo-badge.bespreking { background: rgba(96,165,250,.08); color: #60a5fa; border: 1px solid rgba(96,165,250,.18); }
    .memo-badge.urgent { background: rgba(239,68,68,.08); color: #ef4444; border: 1px solid rgba(239,68,68,.2); }

    .tile-arrow-sm {
      width: 24px; height: 24px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--text-tertiary);
    }
  </style>
</head>
<body>

<div class="page">
  <!-- ── Ribbon ────────────────────────────────────────────────── -->
  <nav class="ribbon" aria-label="Hoofdnavigatie">
    <a class="ribbon-logo" href="#" title="TI Studio — Home">
      <svg viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="14" height="14" rx="1.5" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>
        <line x1="2" y1="6.7" x2="16" y2="6.7" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
        <line x1="2" y1="11.3" x2="16" y2="11.3" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
        <line x1="6.7" y1="2" x2="6.7" y2="16" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
        <line x1="11.3" y1="2" x2="11.3" y2="16" stroke="#3b82f6" stroke-width="0.8" opacity="0.3"/>
        <path d="M16 10l-4 4h4v-4z" fill="#3b82f6" opacity="0.15"/>
        <path d="M16.5 5.5l-2-2-6 6-.5 2.5 2.5-.5 6-6zM14.5 7.5l-2-2" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a>

    <div class="ribbon-group">
      <button class="ribbon-btn" title="Werkbord">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="ribbon-btn" title="Personen">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="7" r="3"/><path d="M3 20c0-4 2.7-6 6-6s6 2 6 6"/><circle cx="17" cy="8" r="2.5"/><path d="M16 20c0-2.5 1.5-4 4-4"/>
        </svg>
      </button>
      <div class="ribbon-memo-wrap">
        <button class="ribbon-btn" title="Memo's">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
        </button>
        <span class="ribbon-badge">3</span>
      </div>
    </div>

    <div class="ribbon-sep"></div>

    <div class="ribbon-group">
      <button class="ribbon-btn" title="Kader">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
      </button>
      <button class="ribbon-btn" title="KNKV Sync">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
      </button>
    </div>

    <div class="ribbon-footer">
      <div class="ribbon-sep"></div>
      <div class="ribbon-avatar" title="Uitloggen">AL</div>
    </div>
  </nav>

  <!-- ── Homepage content ──────────────────────────────────────── -->
  <div class="content">
    <div class="home">

      <!-- Header -->
      <div class="home-header">
        <h1 class="home-groet">Goedemiddag, Antjan</h1>
        <div class="home-sub">
          <span>TI Studio</span>
          <span style="color:var(--border-default)">·</span>
          <span class="seizoen-badge">
            <span class="dot"></span>
            2026–2027
          </span>
        </div>
      </div>

      <!-- Tiles -->
      <div class="tiles">

        <!-- Werkbord (primair) -->
        <a class="tile-primary" href="#">
          <div class="ring-wrap">
            <svg width="52" height="52" viewBox="0 0 52 52">
              <circle cx="26" cy="26" r="22" fill="rgba(59,130,246,.06)" stroke="rgba(59,130,246,.15)" stroke-width="1"/>
              <circle cx="26" cy="26" r="12" fill="none" stroke="rgba(59,130,246,.15)" stroke-width="3"/>
              <circle cx="26" cy="26" r="12" fill="none" stroke="#3b82f6" stroke-width="3"
                stroke-dasharray="75.4" stroke-dashoffset="18.85" stroke-linecap="round"/>
            </svg>
            <span class="ring-pct">75%</span>
          </div>
          <div class="tile-primary-text">
            <div class="tile-primary-title">Werkbord</div>
            <div class="tile-primary-desc">Visuele editor voor teamopstelling</div>
          </div>
          <div class="tile-primary-stats">
            <div class="tile-primary-num">84</div>
            <div class="tile-primary-label">/ 112 spelers</div>
          </div>
          <div class="tile-arrow">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 8h10M9 4l4 4-4 4"/>
            </svg>
          </div>
        </a>

        <!-- 2-kolom: Personen + Kader -->
        <div class="tiles-grid">
          <a class="tile-sec" href="#">
            <div class="tile-sec-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="9" cy="7" r="3"/><path d="M3 20c0-4 2.7-6 6-6s6 2 6 6"/>
                <circle cx="17" cy="8" r="2.5"/><path d="M16 20c0-2.5 1.5-4 4-4"/>
              </svg>
            </div>
            <div>
              <div class="tile-sec-title">Personen</div>
              <div class="tile-sec-desc">Spelers, staf en reserveringen</div>
            </div>
          </a>

          <a class="tile-sec" href="#">
            <div class="tile-sec-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11 14 15 10"/>
              </svg>
            </div>
            <div>
              <div class="tile-sec-title">Kaders</div>
              <div class="tile-sec-desc">Seizoenskader per team beheren</div>
            </div>
          </a>

          <!-- Memo (full width) -->
          <a class="tile-sec tile-memo" href="#">
            <div class="tile-sec-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="8" y1="13" x2="16" y2="13"/>
                <line x1="8" y1="17" x2="13" y2="17"/>
              </svg>
            </div>
            <div class="tile-memo-content">
              <div class="tile-sec-title">Memo-items</div>
              <div class="memo-badges">
                <span class="memo-badge open">2 open</span>
                <span class="memo-badge bespreking">1 in bespreking</span>
                <span class="memo-badge urgent">▲ 1 hoge prio</span>
              </div>
            </div>
            <div class="tile-arrow-sm">
              <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 8h10M9 4l4 4-4 4"/>
              </svg>
            </div>
          </a>
        </div>

      </div>
    </div>
  </div>
</div>

</body>
</html>
