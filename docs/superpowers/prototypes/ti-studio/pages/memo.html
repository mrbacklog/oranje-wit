<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memo's — TI Studio</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <style>
    .shell-content { padding: 0 !important; overflow: hidden !important; }

    /* ─── Kanban layout ──────────────────────────────────────────── */
    .kanban-page { display: flex; flex-direction: column; flex: 1; min-height: 0; }

    .kanban-header {
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid var(--border-light); flex-shrink: 0;
    }
    .kanban-header h1 { font-size: 16px; font-weight: 700; margin: 0; }

    .kh-links { display: flex; align-items: center; gap: 10px; flex: 1; }

    /* Zoekbalk */
    .memo-zoek {
      position: relative; display: flex; align-items: center;
    }
    .memo-zoek input {
      background: var(--surface-card); border: 1px solid var(--border-default);
      border-radius: 7px; color: var(--text-primary); font-size: 12px;
      font-family: inherit; padding: 5px 10px 5px 28px;
      outline: none; width: 180px; transition: border-color 120ms, width 200ms;
    }
    .memo-zoek input:focus { border-color: rgba(255,107,0,.4); width: 220px; }
    .memo-zoek input::placeholder { color: var(--text-muted); }
    .memo-zoek svg {
      position: absolute; left: 8px; width: 13px; height: 13px;
      stroke: var(--text-muted); fill: none; stroke-width: 2;
      stroke-linecap: round; pointer-events: none;
    }

    /* Filters */
    .kanban-filters { display: flex; gap: 6px; }
    .kanban-filter {
      padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 500;
      border: 1px solid var(--border-default); background: none; color: var(--text-tertiary);
      cursor: pointer; font-family: inherit; transition: all 120ms;
    }
    .kanban-filter.active { border-color: var(--ow-accent); background: rgba(255,107,0,.08); color: var(--ow-accent); }
    .kanban-filter:hover:not(.active) { border-color: var(--text-muted); color: var(--text-secondary); }

    /* Nieuwe memo knop */
    .btn-nieuwe-memo {
      padding: 6px 14px; border-radius: 7px; font-size: 12px; font-weight: 600;
      border: 1px solid var(--ow-accent); background: rgba(255,107,0,.12); color: var(--ow-accent);
      cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0;
      transition: background 120ms;
    }
    .btn-nieuwe-memo:hover { background: rgba(255,107,0,.22); }

    .kanban-board {
      flex: 1; display: flex; gap: 1px; overflow-x: auto; min-height: 0;
      background: var(--border-light);
    }

    /* ─── Lane ────────────────────────────────────────────────────── */
    .kanban-lane {
      flex: 1; min-width: 240px; max-width: 320px;
      background: var(--surface-sunken);
      display: flex; flex-direction: column;
    }
    .lane-header {
      padding: 10px 14px; display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border-light); flex-shrink: 0;
    }
    .lane-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .lane-dot.open     { background: #eab308; }
    .lane-dot.bespreking { background: #60a5fa; }
    .lane-dot.opgelost { background: #22c55e; }
    .lane-dot.risico   { background: #f59e0b; }
    .lane-dot.archief  { background: #64748b; }
    .lane-title { font-size: 12px; font-weight: 700; color: var(--text-primary); }
    .lane-count {
      font-size: 10px; font-weight: 700; color: var(--text-tertiary);
      background: var(--surface-card); padding: 1px 6px; border-radius: 4px;
    }
    .lane-body {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 6px;
      scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent;
      transition: background 120ms;
    }
    .lane-body.drag-over-lane {
      outline: 2px dashed var(--ow-accent) !important;
      outline-offset: -4px;
      background: rgba(255,107,0,.04) !important;
    }

    /* ─── Memo-kaart ──────────────────────────────────────────────── */
    .memo-kaart {
      display: flex; gap: 10px; padding: 10px 12px;
      background: var(--surface-card); border: 1px solid var(--border-light);
      border-radius: 8px; border-left: 3px solid var(--prio-kleur, var(--border-default));
      cursor: pointer; transition: border-color 150ms, background 150ms, opacity 150ms;
      user-select: none;
    }
    .memo-kaart[draggable="true"] { cursor: grab; }
    .memo-kaart[draggable="true"]:active { cursor: grabbing; }
    .memo-kaart:hover { background: rgba(255,255,255,.03); border-color: var(--border-default); }
    .memo-kaart.dragging { opacity: 0.4; cursor: grabbing !important; }

    .memo-kaart.prio-BLOCKER { --prio-kleur: #ef4444; }
    .memo-kaart.prio-HOOG    { --prio-kleur: #f97316; }
    .memo-kaart.prio-MIDDEL  { --prio-kleur: #eab308; }
    .memo-kaart.prio-LAAG    { --prio-kleur: #3b82f6; }
    .memo-kaart.prio-INFO    { --prio-kleur: #8b5cf6; }

    .mk-prio {
      width: 16px; height: 16px; border-radius: 3px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; font-weight: 900; color: #fff;
      background: var(--prio-kleur); margin-top: 1px;
    }
    .mk-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; }
    .mk-titel {
      font-size: 11px; font-weight: 600; color: var(--text-primary); line-height: 1.4;
    }
    .mk-beschrijving {
      font-size: 10px; color: var(--text-tertiary); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .mk-meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; margin-top: 2px; }
    .mk-entiteit {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 5px; border-radius: 3px;
      font-size: 8px; font-weight: 600; text-transform: uppercase;
      cursor: pointer; transition: opacity 120ms;
    }
    .mk-entiteit:hover { opacity: 0.75; }
    .mk-entiteit.SPELER { color: var(--sexe-h); background: rgba(37,99,235,.08); border: 1px solid rgba(37,99,235,.15); }
    .mk-entiteit.STAF   { color: var(--staf-accent); background: var(--staf-accent-dim); border: 1px solid var(--staf-border); }
    .mk-entiteit.TEAM   { color: var(--text-secondary); background: rgba(255,255,255,.04); border: 1px solid var(--border-light); }
    .mk-entiteit.TC     { color: var(--ow-accent); background: rgba(255,107,0,.06); border: 1px solid rgba(255,107,0,.12); }
    .mk-naam { font-size: 9px; color: var(--text-tertiary); font-weight: 500; }

    /* Opgeloste/risico/archief kolom: kaarten gedempt */
    .kanban-lane.done .memo-kaart { opacity: .6; }
    .kanban-lane.done .memo-kaart:hover { opacity: .85; }

    /* Leeg-state */
    .lane-leeg {
      font-size: 11px; color: var(--text-muted); text-align: center;
      padding: 16px 8px; border: 1px dashed var(--border-light); border-radius: 6px;
    }

    /* Zoek geen resultaat */
    .memo-kaart.verborgen { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import { shell } from '../shared/shell.js';
    import { MEMOS, getMemo, getSpeler, getStaf, getTeam } from '../shared/mock-data.js';
    import {
      openMemoDrawer,
      openNieuweMemoDialog,
      openSpelerDialog,
      openStafDialog,
      openTeamDialog,
    } from '../shared/interactions.js';

    // ── Kolom-definitie ──────────────────────────────────────────────────────────
    const KOLOMMEN = [
      { status: 'OPEN',         label: 'Open',               dotKlasse: 'open',      done: false },
      { status: 'IN_BESPREKING',label: 'In bespreking',      dotKlasse: 'bespreking',done: false },
      { status: 'RISICO',       label: 'Geaccepteerd risico',dotKlasse: 'risico',    done: true  },
      { status: 'OPGELOST',     label: 'Opgelost',           dotKlasse: 'opgelost',  done: true  },
    ];

    const PRIO_LABEL = { BLOCKER: '!', HOOG: 'H', MIDDEL: 'M', LAAG: 'L', INFO: 'i' };

    // ── Zoek/filter state ────────────────────────────────────────────────────────
    let zoekterm = '';
    let actieveCatFilter = 'Alles';

    // ── Render helpers ───────────────────────────────────────────────────────────
    function isZichtbaar(memo) {
      if (actieveCatFilter !== 'Alles') {
        const map = { 'Spelers': 'SPELER', 'Staf': 'STAF', 'Teams': 'TEAM', 'TC': 'TC' };
        if (memo.entiteitType !== map[actieveCatFilter]) return false;
      }
      if (!zoekterm) return true;
      const q = zoekterm.toLowerCase();
      return (memo.titel + ' ' + memo.beschrijving).toLowerCase().includes(q);
    }

    function renderKaart(memo) {
      const zichtbaar = isZichtbaar(memo);
      const div = document.createElement('div');
      div.className = `memo-kaart prio-${memo.prioriteit}${zichtbaar ? '' : ' verborgen'}`;
      div.dataset.memoId = memo.id;
      div.dataset.status = memo.status;
      div.draggable = true;

      const heeftEntiteit = memo.entiteitType !== 'TC' && memo.entiteitId;
      const entiteitHtml = `
        <span class="mk-entiteit ${memo.entiteitType}" data-entiteit-type="${memo.entiteitType}" data-entiteit-id="${memo.entiteitId ?? ''}">
          ${memo.entiteitType}
        </span>
        ${heeftEntiteit ? `<span class="mk-naam">${memo.entiteitLabel}</span>` : ''}
      `;

      div.innerHTML = `
        <div class="mk-prio">${PRIO_LABEL[memo.prioriteit] ?? '?'}</div>
        <div class="mk-body">
          <div class="mk-titel">${memo.titel}</div>
          <div class="mk-beschrijving">${memo.beschrijving}</div>
          <div class="mk-meta">${entiteitHtml}</div>
        </div>
      `;

      // Klik op kaart → drawer (niet op entiteit-badge)
      div.addEventListener('click', (e) => {
        if (e.target.closest('.mk-entiteit')) return;
        openMemoDrawer(memo.id);
      });

      // Klik op entiteit-badge → entiteit-dialog
      const badge = div.querySelector('.mk-entiteit');
      if (badge) {
        badge.addEventListener('click', (e) => {
          e.stopPropagation();
          const type = badge.dataset.entiteitType;
          const id   = badge.dataset.entiteitId;
          if (!id) return;
          if (type === 'SPELER') openSpelerDialog(id);
          else if (type === 'STAF') openStafDialog(id);
          else if (type === 'TEAM') openTeamDialog(id);
        });
      }

      // Drag-and-drop
      div.addEventListener('dragstart', (e) => {
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', memo.id);
        requestAnimationFrame(() => div.classList.add('dragging'));
      });
      div.addEventListener('dragend', () => {
        div.classList.remove('dragging');
        document.querySelectorAll('.drag-over-lane').forEach(el => el.classList.remove('drag-over-lane'));
      });

      return div;
    }

    function renderKolom(kolom, board) {
      const memos = MEMOS.filter(m => m.status === kolom.status);
      const zichtbaarAantal = memos.filter(isZichtbaar).length;

      const lane = document.createElement('div');
      lane.className = `kanban-lane${kolom.done ? ' done' : ''}`;
      lane.dataset.status = kolom.status;

      lane.innerHTML = `
        <div class="lane-header">
          <span class="lane-dot ${kolom.dotKlasse}"></span>
          <span class="lane-title">${kolom.label}</span>
          <span class="lane-count" data-count="${kolom.status}">${zichtbaarAantal}</span>
        </div>
      `;

      const body = document.createElement('div');
      body.className = 'lane-body';
      body.dataset.dropzone = kolom.status;

      if (memos.length === 0) {
        const leeg = document.createElement('div');
        leeg.className = 'lane-leeg';
        leeg.textContent = 'Geen memo\'s';
        body.appendChild(leeg);
      } else {
        memos.forEach(memo => body.appendChild(renderKaart(memo)));
      }

      // Drag-over styling
      body.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        body.classList.add('drag-over-lane');
      });
      body.addEventListener('dragleave', (e) => {
        if (!body.contains(e.relatedTarget)) body.classList.remove('drag-over-lane');
      });
      body.addEventListener('drop', (e) => {
        e.preventDefault();
        body.classList.remove('drag-over-lane');
        const memoId = e.dataTransfer.getData('text/plain');
        const nieuweStatus = body.dataset.dropzone;
        const memo = getMemo(memoId);
        if (!memo || memo.status === nieuweStatus) return;
        // eslint-disable-next-line no-console
        console.log(`[mock] status gewijzigd: ${memoId} → ${nieuweStatus}`);
        memo.status = nieuweStatus;
        renderAll();
      });

      lane.appendChild(body);
      board.appendChild(lane);
    }

    function renderAll() {
      const board = document.querySelector('.kanban-board');
      if (!board) return;
      board.innerHTML = '';
      KOLOMMEN.forEach(k => renderKolom(k, board));
    }

    function updateZoekFilter() {
      document.querySelectorAll('.memo-kaart').forEach(el => {
        const memo = getMemo(el.dataset.memoId);
        if (!memo) return;
        el.classList.toggle('verborgen', !isZichtbaar(memo));
      });
      // update tellingen
      KOLOMMEN.forEach(k => {
        const count = MEMOS.filter(m => m.status === k.status && isZichtbaar(m)).length;
        const el = document.querySelector(`[data-count="${k.status}"]`);
        if (el) el.textContent = count;
      });
    }

    // ── Shell initialiseren ──────────────────────────────────────────────────────
    shell('app', { activePage: 'memo', memoCount: MEMOS.length });

    // ── Pagina opbouwen ──────────────────────────────────────────────────────────
    const shellContent = document.querySelector('.shell-content') ?? document.querySelector('main') ?? document.body;

    // Zoek de plek waar content gemount wordt — shell zet doorgaans een .page-content of .shell-content
    // We wachten één tick zodat de shell DOM klaar is
    requestAnimationFrame(() => {
      const container = document.querySelector('.shell-content') ?? document.querySelector('[data-page]') ?? document.body;

      const page = document.createElement('div');
      page.className = 'kanban-page';

      // Header
      const header = document.createElement('div');
      header.className = 'kanban-header';
      header.innerHTML = `
        <div class="kh-links">
          <div class="memo-zoek">
            <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input id="memo-zoek-input" type="search" placeholder="Zoek memo's…" autocomplete="off">
          </div>
          <div class="kanban-filters" id="cat-filters">
            <button class="kanban-filter active" data-cat="Alles">Alles</button>
            <button class="kanban-filter" data-cat="Spelers">Spelers</button>
            <button class="kanban-filter" data-cat="Staf">Staf</button>
            <button class="kanban-filter" data-cat="Teams">Teams</button>
            <button class="kanban-filter" data-cat="TC">TC</button>
          </div>
        </div>
        <button class="btn-nieuwe-memo" id="btn-nieuwe-memo">+ Nieuwe memo</button>
      `;

      // Kanban board
      const board = document.createElement('div');
      board.className = 'kanban-board';

      page.appendChild(header);
      page.appendChild(board);
      container.appendChild(page);

      // Initieel renderen
      KOLOMMEN.forEach(k => renderKolom(k, board));

      // ── Zoek ────────────────────────────────────────────────────────────────────
      document.getElementById('memo-zoek-input').addEventListener('input', (e) => {
        zoekterm = e.target.value.trim();
        updateZoekFilter();
      });

      // ── Categorie filter ─────────────────────────────────────────────────────────
      document.getElementById('cat-filters').addEventListener('click', (e) => {
        const btn = e.target.closest('.kanban-filter');
        if (!btn) return;
        actieveCatFilter = btn.dataset.cat;
        document.querySelectorAll('.kanban-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateZoekFilter();
      });

      // ── Nieuwe memo ──────────────────────────────────────────────────────────────
      document.getElementById('btn-nieuwe-memo').addEventListener('click', () => {
        openNieuweMemoDialog({
          onCreate: (m) => {
            MEMOS.push(m);
            renderAll();
          },
        });
      });
    });
  </script>
</body>
</html>
