<!-- REFERENTIE: ribbon — uit werkindeling-v4.html -->
<!-- Gebruik dit als 1-op-1 referentie voor de React implementatie -->
<!-- De ribbon is een smalle icoonbalk links (48px breed), loopt vol hoogte (grid-row 1/3) -->

<style>
/* ── SHELL LAYOUT (context voor ribbon positie) ── */
.shell {
  display: grid;
  grid-template-columns: var(--ribbon) 1fr;
  grid-template-rows: var(--toolbar) 1fr;
  height: 100vh;
  overflow: hidden;
}

/* ── RIBBON ── */
.ribbon {
  grid-row: 1 / 3;
  grid-column: 1;
  background: var(--bg-1);
  border-right: 1px solid var(--border-0);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 8px;
  gap: 2px;
  z-index: 40;
  position: relative;
}

.ribbon-logo {
  width: 30px; height: 30px;
  background: linear-gradient(135deg, #FF6B00, #FF8533);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 900; color: #fff;
  margin-bottom: 12px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(255,107,0,.35);
  letter-spacing: -0.5px;
}

.ri-group { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.ri-div { width: 22px; height: 1px; background: var(--border-0); margin: 6px 0; }

.ri {
  width: 36px; height: 36px; border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; background: none; border: none;
  font-size: 15px; color: var(--text-3);
  transition: background 120ms, color 120ms;
  position: relative; flex-shrink: 0;
}
.ri:hover { background: var(--bg-3); color: var(--text-1); }
.ri.active {
  background: var(--accent-dim); color: var(--accent);
}
.ri.active::before {
  content: '';
  position: absolute; left: -1px; top: 7px; bottom: 7px;
  width: 3px; background: var(--accent);
  border-radius: 0 2px 2px 0;
}
.ri-badge {
  position: absolute; top: 4px; right: 4px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--err); border: 2px solid var(--bg-1);
}

/* Tooltip */
.ri::after {
  content: attr(data-tip);
  position: absolute; left: calc(var(--ribbon) + 4px); top: 50%;
  transform: translateY(-50%);
  background: var(--bg-2); border: 1px solid var(--border-1);
  color: var(--text-1); font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 7px; white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 100ms;
  z-index: 100; box-shadow: var(--sh-raise);
}
.ri:hover::after { opacity: 1; }

.ribbon-footer {
  margin-top: auto;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.ri-avatar {
  width: 28px; height: 28px; border-radius: 50%;
  background: #2a1a0a; border: 2px solid rgba(255,107,0,.3);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: var(--accent);
  cursor: pointer; position: relative;
}
.ri-avatar::after {
  content: attr(data-tip);
  position: absolute; left: calc(var(--ribbon) + 4px); top: 50%;
  transform: translateY(-50%);
  background: var(--bg-2); border: 1px solid var(--border-1);
  color: var(--text-1); font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 7px; white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 100ms;
  z-index: 100; box-shadow: var(--sh-raise);
}
.ri-avatar:hover::after { opacity: 1; }
</style>

<!-- HTML fragment -->
<nav class="ribbon" id="ribbon">
  <div class="ribbon-logo">OW</div>

  <div class="ri-group">
    <button class="ri" data-tip="Spelerspool" data-panel="pool" onclick="togglePanel('pool')" id="ri-pool">
      <!-- personen icoon -->
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </button>
    <button class="ri active" data-tip="Validatie" data-panel="val" onclick="togglePanel('val')" id="ri-val">
      <!-- shield icoon -->
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      <span class="ri-badge"></span>
    </button>
    <button class="ri" data-tip="Werkbord" data-panel="werkbord" onclick="togglePanel('werkbord')" id="ri-werkbord">
      <!-- layout icoon -->
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
      </svg>
    </button>
  </div>

  <div class="ri-div"></div>

  <div class="ri-group">
    <button class="ri" data-tip="What-If" onclick="toggleWhatIf()" id="ri-whatif">
      <!-- zap icoon -->
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </button>
    <button class="ri" data-tip="Versies">
      <!-- git-branch icoon -->
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="6" y1="3" x2="6" y2="15"/>
        <circle cx="18" cy="6" r="3"/>
        <circle cx="6" cy="18" r="3"/>
        <path d="M18 9a9 9 0 0 1-9 9"/>
      </svg>
    </button>
  </div>

  <div class="ribbon-footer">
    <div class="ri-div"></div>
    <button class="ri" data-tip="Instellingen">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
      </svg>
    </button>
    <div class="ri-avatar" data-tip="Antjan L.">AL</div>
  </div>
</nav>
