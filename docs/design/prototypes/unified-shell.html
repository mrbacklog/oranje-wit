<!DOCTYPE html>
<html lang="nl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OW Unified Shell — Prototype</title>
  <style>
    :root {
      --ow-oranje: #ff6b00;
      --surface-page: #0f1115;
      --surface-card: #1a1d23;
      --surface-raised: #22262e;
      --surface-scrim: rgba(0,0,0,0.7);
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --border-default: #2a2e36;
      --border-strong: #3a3f4a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Inter", system-ui, -apple-system, sans-serif;
      background: var(--surface-page);
      color: var(--text-primary);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      position: relative;
      overflow-x: hidden;
    }

    /* ─── TopBar ─────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      z-index: 40;
      background: color-mix(in srgb, var(--surface-page) 85%, transparent);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-default);
    }
    .topbar h1 { font-size: 18px; font-weight: 600; flex: 1; }
    .topbar-btn {
      width: 44px; height: 44px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: none;
      color: var(--ow-oranje); cursor: pointer;
      border-radius: 12px;
      transition: background 0.2s;
    }
    .topbar-btn:hover { background: rgba(255,107,0,0.1); }

    /* ─── Content ────────────────────────────────── */
    .content {
      padding: 72px 16px 80px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ─── Cards ──────────────────────────────────── */
    .card {
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: 16px;
      padding: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:active { transform: scale(0.98); }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .card-subtitle { font-size: 13px; color: var(--text-secondary); }

    .metric {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: var(--ow-oranje);
      line-height: 1.1;
    }
    .metric-label { font-size: 13px; color: var(--text-muted); margin-top: 4px; }

    .kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .kpi {
      background: var(--surface-card);
      border: 1px solid var(--border-default);
      border-radius: 16px;
      padding: 16px;
    }
    .kpi-value { font-size: 28px; font-weight: 700; letter-spacing: -0.03em; }
    .kpi-label { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

    /* Band colors */
    .band-blauw { color: #3b82f6; }
    .band-groen { color: #22c55e; }
    .band-geel { color: #eab308; }
    .band-oranje { color: #f97316; }

    /* ─── BottomNav ──────────────────────────────── */
    .bottomnav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 430px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: color-mix(in srgb, var(--surface-card) 92%, transparent);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border-default);
      padding: 6px 0 env(safe-area-inset-bottom, 8px);
      z-index: 50;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 6px 12px;
      min-width: 44px;
      min-height: 44px;
      border: none;
      background: none;
      cursor: pointer;
      transition: color 0.2s;
      font-size: 11px;
      font-weight: 500;
      text-decoration: none;
    }
    .nav-item.active { color: var(--ow-oranje); }
    .nav-item:not(.active) { color: var(--text-muted); }
    .nav-item:not(.active):hover { color: var(--text-secondary); }
    .nav-item svg { width: 24px; height: 24px; }

    /* ─── App Switcher ───────────────────────────── */
    .overlay {
      position: fixed;
      inset: 0;
      background: var(--surface-scrim);
      z-index: 60;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .app-sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 430px;
      background: var(--surface-raised);
      border-radius: 24px 24px 0 0;
      padding: 12px 24px 40px;
      z-index: 70;
      transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .app-sheet.open { transform: translateX(-50%) translateY(0); }

    .sheet-handle {
      width: 40px; height: 4px;
      background: var(--border-strong);
      border-radius: 4px;
      margin: 0 auto 24px;
    }

    .app-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .app-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 8px;
      border-radius: 16px;
      cursor: pointer;
      border: none;
      background: none;
      transition: background 0.2s;
      text-decoration: none;
    }
    .app-item:hover { background: rgba(255,255,255,0.04); }
    .app-item.active { background: rgba(255,107,0,0.08); }
    .app-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app-icon svg { width: 28px; height: 28px; }
    .app-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .app-desc { font-size: 11px; color: var(--text-muted); }
    .app-item.active .app-name { color: var(--ow-oranje); }

    /* ─── Tabs ───────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 4px;
      background: var(--surface-card);
      border-radius: 12px;
      padding: 4px;
      border: 1px solid var(--border-default);
    }
    .tab {
      flex: 1;
      padding: 8px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: var(--ow-oranje);
      color: white;
    }

    /* ─── Badge ──────────────────────────────────── */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 9999px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-green { background: rgba(34,197,94,0.15); color: #4ade80; }
    .badge-orange { background: rgba(249,115,22,0.15); color: #fb923c; }
    .badge-red { background: rgba(239,68,68,0.15); color: #f87171; }

    /* ─── Animations ─────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .content > * {
      animation: fadeInUp 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
    }
    .content > *:nth-child(1) { animation-delay: 0.05s; }
    .content > *:nth-child(2) { animation-delay: 0.1s; }
    .content > *:nth-child(3) { animation-delay: 0.15s; }
    .content > *:nth-child(4) { animation-delay: 0.2s; }
    .content > *:nth-child(5) { animation-delay: 0.25s; }
  </style>
</head>
<body>

  <!-- TopBar -->
  <div class="topbar">
    <h1>OW Scout</h1>
    <button class="topbar-btn" aria-label="Notificaties">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" stroke="currentColor" stroke-linecap="round"/>
        <path d="M13.73 21a2 2 0 01-3.46 0" stroke="currentColor" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Content -->
  <div class="content">
    <!-- Hero metric -->
    <div class="card">
      <div class="metric">142</div>
      <div class="metric-label">Actieve jeugdleden</div>
    </div>

    <!-- KPI Grid -->
    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-value band-blauw">28</div>
        <div class="kpi-label">Blauw (6-7)</div>
      </div>
      <div class="kpi">
        <div class="kpi-value band-groen">34</div>
        <div class="kpi-label">Groen (8-9)</div>
      </div>
      <div class="kpi">
        <div class="kpi-value band-geel">38</div>
        <div class="kpi-label">Geel (10-12)</div>
      </div>
      <div class="kpi">
        <div class="kpi-value band-oranje">42</div>
        <div class="kpi-label">Oranje (13-15)</div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active">Overzicht</button>
      <button class="tab">Recent</button>
      <button class="tab">Verzoeken</button>
    </div>

    <!-- Cards -->
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div class="card-title">Scouting ronde 3</div>
          <div class="card-subtitle">12 rapporten · 4 scouts</div>
        </div>
        <span class="badge badge-green">Actief</span>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div class="card-title">Verzoek: Geel spitsen</div>
          <div class="card-subtitle">Deadline: 15 april</div>
        </div>
        <span class="badge badge-orange">Open</span>
      </div>
    </div>

    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <div class="card-title">Team OW A1 evaluatie</div>
          <div class="card-subtitle">8/10 ingevuld</div>
        </div>
        <span class="badge badge-green">Bijna klaar</span>
      </div>
    </div>
  </div>

  <!-- BottomNav -->
  <div class="bottomnav" id="bottomnav">
    <button class="nav-item active" onclick="switchTab(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5">
        <path d="M3 12l9-8 9 8" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M5 10v9a1 1 0 001 1h3v-5h6v5h3a1 1 0 001-1v-9" stroke="currentColor" stroke-linecap="round"/>
      </svg>
      <span>Home</span>
    </button>
    <button class="nav-item" onclick="switchTab(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" stroke="currentColor" stroke-linecap="round"/>
        <rect x="9" y="3" width="6" height="4" rx="1" stroke="currentColor"/>
        <path d="M9 12h6M9 16h4" stroke="currentColor" stroke-linecap="round"/>
      </svg>
      <span>Verzoeken</span>
    </button>
    <button class="nav-item" onclick="switchTab(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <circle cx="11" cy="11" r="7" stroke="currentColor"/>
        <path d="M21 21l-4.35-4.35" stroke="currentColor" stroke-linecap="round"/>
      </svg>
      <span>Zoeken</span>
    </button>
    <button class="nav-item" onclick="switchTab(this)">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <circle cx="12" cy="8" r="4" stroke="currentColor"/>
        <path d="M6 21v-1a6 6 0 0112 0v1" stroke="currentColor" stroke-linecap="round"/>
      </svg>
      <span>Profiel</span>
    </button>
    <button class="nav-item" id="apps-btn" onclick="toggleAppSwitcher()">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor"/>
        <rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor"/>
        <rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor"/>
        <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor"/>
      </svg>
      <span>Apps</span>
    </button>
  </div>

  <!-- App Switcher -->
  <div class="overlay" id="overlay" onclick="toggleAppSwitcher()"></div>
  <div class="app-sheet" id="app-sheet">
    <div class="sheet-handle"></div>
    <div class="app-grid">
      <button class="app-item active" onclick="toggleAppSwitcher()">
        <div class="app-icon" style="background: linear-gradient(135deg, #ff6b00, #c24e00);">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
            <circle cx="11" cy="11" r="7" stroke="white"/>
            <path d="M21 21l-4.35-4.35" stroke="white" stroke-linecap="round"/>
            <circle cx="11" cy="11" r="2" stroke="white"/>
          </svg>
        </div>
        <span class="app-name">Scout</span>
        <span class="app-desc">Jeugdscouting</span>
      </button>
      <button class="app-item" onclick="toggleAppSwitcher()">
        <div class="app-icon" style="background: linear-gradient(135deg, #3b82f6, #1d4ed8);">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
            <circle cx="9" cy="7" r="3" stroke="white"/>
            <path d="M3 21v-1a6 6 0 0112 0v1" stroke="white" stroke-linecap="round"/>
            <circle cx="17" cy="9" r="2.5" stroke="white"/>
            <path d="M21 21v-.5a4 4 0 00-4-4" stroke="white" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="app-name">Teams</span>
        <span class="app-desc">Teamindeling</span>
      </button>
      <button class="app-item" onclick="toggleAppSwitcher()">
        <div class="app-icon" style="background: linear-gradient(135deg, #eab308, #a16207);">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" stroke="white" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="app-name">Evaluatie</span>
        <span class="app-desc">Spelerevaluaties</span>
      </button>
      <button class="app-item" onclick="toggleAppSwitcher()">
        <div class="app-icon" style="background: linear-gradient(135deg, #22c55e, #15803d);">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
            <path d="M3 3v18h18" stroke="white" stroke-linecap="round"/>
            <path d="M7 14l4-4 4 4 5-5" stroke="white" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="app-name">Monitor</span>
        <span class="app-desc">Verenigingsmonitor</span>
      </button>
      <button class="app-item" onclick="toggleAppSwitcher()">
        <div class="app-icon" style="background: linear-gradient(135deg, #6b7280, #374151);">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
            <circle cx="12" cy="12" r="3" stroke="white"/>
            <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z" stroke="white" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="app-name">Beheer</span>
        <span class="app-desc">TC Beheer</span>
      </button>
    </div>
  </div>

  <script>
    function switchTab(el) {
      document.querySelectorAll('.nav-item').forEach(item => {
        item.classList.remove('active');
        item.querySelector('svg').setAttribute('stroke-width', '1.5');
      });
      el.classList.add('active');
      el.querySelector('svg').setAttribute('stroke-width', '2.5');
    }

    function toggleAppSwitcher() {
      const overlay = document.getElementById('overlay');
      const sheet = document.getElementById('app-sheet');
      const btn = document.getElementById('apps-btn');
      const isOpen = overlay.classList.contains('open');

      if (isOpen) {
        overlay.classList.remove('open');
        sheet.classList.remove('open');
        btn.classList.remove('active');
      } else {
        overlay.classList.add('open');
        sheet.classList.add('open');
        btn.classList.add('active');
      }
    }

    // Tab switching in content
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
      });
    });
  </script>
</body>
</html>
